<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Trade - Trade Your Talents</title>
    <script>
      (function() {
        try {
          const userInfo = localStorage.getItem('userInfo');
          const savedWallpaper = localStorage.getItem('skill-trade-wallpaper');
          const savedThemeString = localStorage.getItem('skill-trade-theme');
          
          // Default branding for visitors OR if no theme is found
          let finalWallpaper = '/bg-wallpaper.png';
          let theme = null;
          
          if (userInfo && savedWallpaper) {
            finalWallpaper = savedWallpaper;
            if (savedThemeString) {
              theme = JSON.parse(savedThemeString);
            }
          }
          
          // Migrate stale paths
          if (finalWallpaper.includes('/src/assets/')) {
            finalWallpaper = '/bg-wallpaper.png';
          }
          
          const root = document.documentElement;
          const setProp = (name, val) => { if (val) root.style.setProperty(name, val); };
          
          // Apply variables to root immediately (even in <head>, root is available)
          root.style.setProperty('--st-bg-image', 'url("' + finalWallpaper + '")');
          
          if (theme) {
            setProp('--st-bg-primary', theme.bgPrimary);
            setProp('--st-bg-secondary', theme.bgSecondary);
            setProp('--st-sidebar', theme.sidebar);
            setProp('--st-card', theme.card);
            setProp('--st-accent', theme.accent);
            setProp('--st-button-dark', theme.buttonDark);
            setProp('--st-button-focus', theme.buttonFocus);
            setProp('--st-text-secondary', theme.textSecondary);
            setProp('--st-text-primary', theme.textPrimary);
          }
        } catch (e) {
          console.warn('Theme initialization failed', e);
        }
      })();
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
